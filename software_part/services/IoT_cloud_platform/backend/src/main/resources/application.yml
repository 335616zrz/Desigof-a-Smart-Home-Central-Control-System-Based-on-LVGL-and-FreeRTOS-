spring:
  application:
    name: iot-cloud-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iot_cloud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:iot_user}
    # DO NOT hardcode real passwords in repo; set via env (e.g. SPRING_DATASOURCE_PASSWORD).
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${SPRING_DATA_REDIS_HOST:localhost}
    port: ${SPRING_DATA_REDIS_PORT:6379}
    password: ${SPRING_DATA_REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd'T'HH:mm:ss

mybatis:
  type-aliases-package: iot.domain
  mapper-locations: classpath:mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    iot: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/app.log

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
          - logfile
  metrics:
    export:
      prometheus:
        enabled: true

mqtt:
  enabled: true

iot:
  mqtt:
    broker: ${IOT_MQTT_BROKER:tcp://localhost:1883}
    username: ${IOT_MQTT_USERNAME:iot_core}
    # Set via env (e.g. IOT_MQTT_PASSWORD). Keep empty by default in repo.
    password: ${IOT_MQTT_PASSWORD:}
    client-id: cloud-core
    topic:
      devices: devices/+/state

security:
  jwt:
    # Set via env (SECURITY_JWT_SECRET). Keep empty by default in repo.
    secret: ${SECURITY_JWT_SECRET:}
    expiration-seconds: 7200
    refresh-expiration-seconds: 604800

# File-based music management (source of truth: Music_Server/index.json)
music:
  storage-path: ${MUSIC_STORAGE_PATH:/data/music}
  cache-path: ${MUSIC_CACHE_PATH:/data/music/cache}
  esp32-base-url: ${MUSIC_ESP32_BASE_URL:https://servers.local}
