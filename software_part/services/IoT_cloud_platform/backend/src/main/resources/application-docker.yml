spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/iot_cloud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:iot_user}
    # Required in docker profile; set via docker-compose env: SPRING_DATASOURCE_PASSWORD
    password: ${SPRING_DATASOURCE_PASSWORD}
  redis:
    host: ${SPRING_DATA_REDIS_HOST:redis}
    port: ${SPRING_DATA_REDIS_PORT:6379}
    password: ${SPRING_DATA_REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

iot:
  mqtt:
    broker: ${IOT_MQTT_BROKER:tcp://emqx:1883}
    username: ${IOT_MQTT_USERNAME:iot_core}
    # Required; set via docker-compose env: IOT_MQTT_PASSWORD
    password: ${IOT_MQTT_PASSWORD}

security:
  jwt:
    # Required; set via docker-compose env: SECURITY_JWT_SECRET
    secret: ${SECURITY_JWT_SECRET}
    expiration-seconds: ${SECURITY_JWT_EXPIRATION:7200}
    refresh-expiration-seconds: ${SECURITY_JWT_REFRESH_EXPIRATION:604800}

music:
  storage-path: ${MUSIC_STORAGE_PATH:/data/music}
  cache-path: ${MUSIC_CACHE_PATH:/data/music/cache}
  esp32-base-url: ${MUSIC_ESP32_BASE_URL:https://servers.local}
