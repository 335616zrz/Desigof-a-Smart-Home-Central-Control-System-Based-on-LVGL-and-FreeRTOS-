services:
  mysql:
    image: mysql:8.0
    container_name: iot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in deploy/.env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-iot_cloud}
      MYSQL_USER: ${MYSQL_USER:-iot_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in deploy/.env}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    # Flyway migration creates a trigger. When MySQL binary logging is enabled, non-SUPER users
    # may be blocked from creating triggers unless this flag is set.
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--log-bin-trust-function-creators=1"]

  redis:
    image: redis:7.2-alpine
    container_name: iot-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data

  emqx:
    image: emqx/emqx:5.6
    container_name: iot-emqx
    restart: unless-stopped
    ports:
      - '${EMQX_MQTT_PORT:-1883}:1883'
      - '${EMQX_MQTT_SSL_PORT:-8883}:8883'
      - '${EMQX_WEBSOCKET_PORT:-8083}:8083'
      - '${EMQX_DASHBOARD_PORT:-18083}:18083'
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:?set in deploy/.env}
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-logs:/opt/emqx/log

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-iot_cloud}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-iot_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?set in deploy/.env}
      SPRING_DATA_REDIS_HOST: redis
      IOT_MQTT_BROKER: tcp://emqx:1883
      IOT_MQTT_USERNAME: ${EMQX_MQTT_USERNAME:-iot_core}
      IOT_MQTT_PASSWORD: ${EMQX_MQTT_PASSWORD:?set in deploy/.env}
      SECURITY_JWT_SECRET: ${JWT_SECRET:?set in deploy/.env}
      # Backend admin bootstrap (required; prevents insecure default password)
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?set in deploy/.env}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@example.com}
      MUSIC_STORAGE_PATH: /data/music
      MUSIC_CACHE_PATH: /data/music/cache
      MUSIC_ESP32_BASE_URL: ${MUSIC_ESP32_BASE_URL:-https://servers.local}
    depends_on:
      - mysql
      - redis
      - emqx
    volumes:
      # Read/write mount for Music_Server. Backend updates index.json and generates cache/*.mp3 for WeChat playback.
      - ../../Music_Server:/data/music:rw
    ports:
      - '${BACKEND_PORT:-8080}:8080'

  gateway:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: iot-gateway
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: /api
      VITE_MQTT_WS_URL: /mqtt
    ports:
      - '${GATEWAY_PORT:-8088}:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Serve music files under /music/* from the repo's Music_Server directory.
      # Example: http://servers.local:8088/music/000%20Mallow%20Flower.mp3
      - ../../Music_Server:/usr/share/nginx/html/music:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: iot-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - '9091:9090'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: iot-grafana
    restart: unless-stopped
    ports:
      - '${GRAFANA_PORT:-3000}:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set in deploy/.env}
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  emqx-data:
  emqx-logs:
  grafana-data:
