user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml application/octet-stream image/svg+xml;
    gzip_min_length 1024;

    upstream backend_api {
        server backend:8080;
    }

    upstream backend_ws {
        server backend:8080;
    }

    upstream emqx_ws {
        server emqx:8083;
    }

    server {
        listen       80;
        server_name  _;

        # SPA route "/music" (music management UI).
        # IMPORTANT: we also serve static audio files under "/music/" via an `alias` below.
        # Because the container has a real "music" directory under the web root, nginx would
        # otherwise treat "/music" as a directory and redirect to "/music/" (dropping host ports
        # like :8088 due to docker port-mapping). Force "/music" to render the SPA instead.
        location = /music {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options SAMEORIGIN;
            add_header Referrer-Policy strict-origin-when-cross-origin;
            add_header X-XSS-Protection "1; mode=block";
        }

        # Serve music assets from a host-mounted directory (see docker-compose volume).
        # This keeps URLs like "/music/xxx.mp3" working for both web and WeChat mini program.
        location /music/ {
            alias /usr/share/nginx/html/music/;
            try_files $uri =404;
            add_header X-Content-Type-Options nosniff;
            add_header Cache-Control "public, max-age=86400";
        }

        location /api/ {
            proxy_pass         http://backend_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass         http://backend_ws$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }

        location /mqtt {
            proxy_pass         http://emqx_ws/mqtt;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /healthz {
            access_log off;
            return 200 'OK';
        }
    }
}
